<div class="header-container">
    <div>
        <a href="/" class="logo-link">
            <img src="/assets/images/logo.png" alt="MAU Arkiv logo" class="logo-large" />
        </a>
    </div>
    <div class="spacer"></div>
    <div class="app-name-section">
        <div class="app-name">
            <h2>MAU Arkiv</h2>
            <span class="version"> {{ version }}</span>
        </div>
        
        <!-- User menu -->
        <div class="user-menu" *ngIf="isAuthenticated$ | async">
            <button mat-button [matMenuTriggerFor]="menu">
                <mat-icon>account_circle</mat-icon>
                <span class="user-name">{{ (currentUser$ | async)?.displayName || (currentUser$ | async)?.email }}</span>
                <mat-icon>arrow_drop_down</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
                <div class="user-info" mat-menu-item disabled>
                    <div class="user-details">
                        <small>{{ (currentUser$ | async)?.email }}</small>
                    </div>
                </div>
                <mat-divider></mat-divider>
                <button mat-menu-item (click)="logout()">
                    <mat-icon>logout</mat-icon>
                    <span>Logga ut</span>
                </button>
            </mat-menu>
        </div>
    </div>
</div>
