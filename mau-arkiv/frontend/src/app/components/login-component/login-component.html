<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>MAU Arkiv</mat-card-title>
      <mat-card-subtitle>Logga in för att fortsätta</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>Du måste logga in med ditt konto för att komma åt arkivet.</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="login()">
        Logga in
      </button>
    </mat-card-actions>
  </mat-card>
</div>
