<div *ngIf="form">
  <div class="form-wrapper">
    <h2>{{ form.title }}</h2>
    <form [formGroup]="formGroup" (keydown.enter)="$event.preventDefault(); search()">
      <div class="form-container">
        <div class="form-fields">
          <div *ngFor="let col of form.queryColumns;">
            <mat-form-field appearance="fill">
              <mat-label>{{ col.title }}</mat-label>
              <input  matInput [formControlName]="col.uid" type="text" #formInput />
            </mat-form-field>
          </div>
        </div>
        
        <div class="button-group">
          <button mat-raised-button color="primary" type="button" (click)="search()" [disabled]="searchState === 'loading'">
            {{ searchState === 'loading' ? 'Söker...' : 'Sök' }}
          </button>
          <button mat-stroked-button color="warn" type="button" (click)="reset();">Rensa</button>
        </div>
      </div>
    </form>
  </div>
  <div *ngIf="error" class="error-message">
    <p>{{ error }}</p>
  </div>
  <!-- Display search results -->
  <div *ngIf="searchState === 'finished'" class="search-results">
    <div class="results-header">
      <h3>Sökresultat</h3>
      <span class="results-count">Hittade {{ searchResult.totalCount }} resultat.</span>
    </div>
    <div *ngIf="searchResult.totalCount > 0">
      <table mat-table [dataSource]="searchResult.rows" class="mat-elevation-z8" style="border: 1px solid #771515;">
      
      <!-- Dynamic columns based on resultColumns or data keys -->
      <ng-container *ngFor="let columnName of displayedColumns; let idx = index"  [matColumnDef]="columnName">
        <th mat-header-cell *matHeaderCellDef 
          [class.sortable]="isSortableColumn(columnName)"
          (click)="isSortableColumn(columnName) ? onColumnHeaderClick(columnName) : null"
          [style.cursor]="isSortableColumn(columnName) ? 'pointer' : 'default'">
        {{ getColumnTitle(columnName) }}
        <span *ngIf="isSortableColumn(columnName)" class="sort-indicator">
          {{ getSortIndicator(columnName) }}
        </span>
        </th>
        <td mat-cell *matCellDef="let element">
        <ng-container *ngIf="isLinkColumn(columnName) && element[columnName]; else plainText">
          <a [href]="getHref(columnName, element)" target="_blank">{{ element[columnName] }}</a>
        </ng-container>
        <ng-template #plainText>
          {{ element[columnName] }}
        </ng-template>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      
      <!-- Pagination controls -->
      <mat-paginator 
      [length]="searchResult.totalCount"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 25, 50, 100]"
      [pageIndex]="pageIndex"
      (page)="onPageChange($event)"
      showFirstLastButtons>
      </mat-paginator>
    </div>
  </div>
</div>
